---
# docker-compose.yml – local services for eteal integration tests
#
# Usage:
#   docker compose up -d
#   pytest -m integration
#   docker compose down
#
# Services
# --------
#   mssql  – Microsoft SQL Server 2022 (Developer Edition)
#   minio  – MinIO S3-compatible object storage

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eteal-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Eteal_Dev_2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Eteal_Dev_2024!' -C -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: eteal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio-data:/data

volumes:
  minio-data:
